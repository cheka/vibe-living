name: Feature request
description: Suggest an improvement to Vibe Living
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What observable outcomes would make this requirement complete?
    validations:
      required: true
  - type: textarea
    id: considerations
    attributes:
      label: Privacy, accessibility, or safety considerations
