name: Bug report
description: Report a reproducible Vibe Living problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: input
    id: host
    attributes:
      label: Host and version
      placeholder: Codex desktop or Claude Code, including version
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and Mac architecture
      placeholder: macOS 15.5, Apple M3
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove prompts, source code, secrets, and personal data before posting.
